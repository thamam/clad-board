services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    network_mode: host
    environment:
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-changeme}
      - DATABASE_URL=sqlite:///data/dashboard.db
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
